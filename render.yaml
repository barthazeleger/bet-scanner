services:
  - type: web
    name: edgepickr
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: SUPABASE_URL
        value: https://mntfhhzanoyhgfavozhg.supabase.co
      - key: SUPABASE_KEY
        sync: false          # service_role key — vul in via Render dashboard
      # v11.3.24 · ODDS_API_KEY verwijderd (was nergens in runtimecode actief).
      - key: API_FOOTBALL_KEY
        sync: false          # api-sports.io key — vul in via Render dashboard
      - key: JWT_SECRET
        sync: false          # willekeurige lange string, bijv. 64 hex tekens
      - key: ADMIN_EMAIL
        sync: false          # jouw e-mailadres voor eerste login
      - key: ADMIN_PASSWORD
        sync: false          # jouw wachtwoord (minimaal 8 tekens)
      - key: RESEND_KEY
        sync: false          # Resend API key voor email (100/dag gratis)
